#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:linear-gradient(180deg,rgba(5,5,20,.98) 60%,transparent);z-index:100;pointer-events:none;gap:6px;}

.stat{display:flex;flex-direction:column;align-items:center;gap:1px;}
.s-lbl{color:rgba(255,255,255,.38);font-size:.44rem;letter-spacing:2px;font-family:'Orbitron',monospace;}
.s-val{font-family:'Orbitron',monospace;font-size:.88rem;font-weight:700;}
.cv{color:#ff006e;text-shadow:0 0 7px #ff006e;}
.mv{color:#00f5ff;text-shadow:0 0 7px #00f5ff;}
.lv{color:#06d6a0;text-shadow:0 0 7px #06d6a0;}
.wv{color:#ffbe0b;text-shadow:0 0 7px #ffbe0b;}
.xv{color:#8338ec;text-shadow:0 0 7px #8338ec;}
.lkv{color:#ff006e;text-shadow:0 0 7px #ff006e;}

#xp-bar{position:fixed;top:44px;left:0;right:0;height:3px;background:rgba(255,255,255,.06);z-index:100;pointer-events:none;}
#xp-fill{height:100%;background:linear-gradient(90deg,#8338ec,#ff006e);box-shadow:0 0 6px #8338ec;transition:width .3s ease;}

#lvlup-text{font-family:'Orbitron',monospace;font-weight:900;font-size:2.8rem;color:#8338ec;text-shadow:0 0 30px #8338ec,0 0 60px #8338ec;}
#lvlup-sub{font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:5px;color:rgba(255,255,255,.7);}

#combo-num{font-family:'Orbitron',monospace;font-weight:900;font-size:2rem;color:#ffbe0b;text-shadow:0 0 16px #ffbe0b;display:none;}

.rn{font-size:.68rem;font-weight:600;color:rgba(255,255,255,.78);max-width:76px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rm{font-family:'Orbitron',monospace;font-size:.6rem;color:#00f5ff;min-width:30px;text-align:right;}

#killfeed{position:fixed;top:56px;left:10px;display:flex;flex-direction:column;gap:3px;z-index:100;pointer-events:none;max-width:200px;}

// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('game');

let W = GAME_W, H = GAME_H;
canvas.width = W; canvas.height = H;
// Escalar visualmente si la ventana es más pequeña
function scaleCanvas() {
  const scaleX = window.innerWidth  / GAME_W;
  const scaleY = window.innerHeight / GAME_H;
  const scale  = Math.min(scaleX, scaleY);
  canvas.style.width  = (GAME_W * scale) + 'px';
  canvas.style.height = (GAME_H * scale) + 'px';
  canvas.style.left   = ((window.innerWidth  - GAME_W * scale) / 2) + 'px';
  canvas.style.top    = ((window.innerHeight - GAME_H * scale) / 2) + 'px';
}
scaleCanvas();
window.addEventListener('resize', scaleCanvas);

const AC = new (window.AudioContext || window.webkitAudioContext)();
const resume = () => { if (AC.state === 'suspended') AC.resume(); };
document.addEventListener('touchstart', resume, { once: true });
document.addEventListener('click',      resume, { once: true });

function tone(freq, type, dur, vol = 0.25, detune = 0) {
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = type; o.frequency.value = freq; if (detune) o.detune.value = detune;
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.start(); o.stop(AC.currentTime + dur);
  } catch(e){}
}

const EMOJIS = ['😈','🔥','💀','⚡','🎮','👾','🤖','🦁','🐉','💎','🌙','⭐','🎯','👑','🏆','🦊','🐺','🦋','🌀','🎭','🐸','🦄','🐙','👻','🤡'];

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
const rnd  = (a,b) => a + Math.random()*(b-a);
const rndI = (a,b) => Math.floor(rnd(a, b+1));
const clamp= (v,a,b) => Math.max(a, Math.min(b, v));

function hexToRgba(hex, a) {
  const n = parseInt(hex.replace('#',''), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
function lightenHex(hex, amt, a = 1) {
  const n = parseInt(hex.replace('#',''), 16);
  return `rgba(${clamp(((n>>16)&255)+amt,0,255)},${clamp(((n>>8)&255)+amt,0,255)},${clamp((n&255)+amt,0,255)},${a})`;
}

// ═══════════════════════════════════════════════════════════════
// AVATAR CACHE
// ═══════════════════════════════════════════════════════════════
const avcache = {};
function getAvatar(color, emoji) {
  const k = `${color}_${emoji}`;
  if (avcache[k]) return avcache[k];
  const sz=128, oc=document.createElement('canvas');
  oc.width=oc.height=sz;
  const c=oc.getContext('2d');
  const g=c.createRadialGradient(sz*.38,sz*.32,sz*.04,sz/2,sz/2,sz*.54);
  g.addColorStop(0, lightenHex(color,60,1));
  g.addColorStop(1, hexToRgba(color,1));
  c.fillStyle=g; c.beginPath(); c.arc(sz/2,sz/2,sz/2-1,0,Math.PI*2); c.fill();
  c.font=`${sz*.43}px serif`; c.textAlign='center'; c.textBaseline='middle';
  c.fillText(emoji, sz/2, sz/2);
  avcache[k]=oc; return oc;
}

// ═══════════════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════════════
const particles = [];
function burst(x,y,color,n=12,spd=5) {
  for (let i=0;i<n;i++) {
    const a=(Math.PI*2/n)*i+rnd(0,.5), s=rnd(1.5,spd);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:rnd(2,5.5),color,life:1,decay:.022+rnd(0,.022)});
  }
}
function trail(x,y,color) {
  particles.push({x:x+rnd(-3,3),y:y+rnd(-3,3),vx:rnd(-.4,.4),vy:rnd(-.4,.4),r:rnd(1,3),color,life:.55,decay:.044});
}
function tickP() {
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vx*=.94; p.vy*=.94;
    p.life-=p.decay; if(p.life<=0) particles.splice(i,1);
  }
}
function drawP() {
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.shadowBlur=7; ctx.shadowColor=p.color;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(.1,p.r*p.life),0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// Float damage text
function floatText(x,y,text,color) {
  const el = document.createElement('div');
  el.className='float-txt'; el.textContent=text; el.style.color=color;
  el.style.left=`${x}px`; el.style.top=`${y-20}px`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1050);
}

// ═══════════════════════════════════════════════════════════════
// POWER-UPS
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════
// CIRCLE / PLAYER CLASS
// ═══════════════════════════════════════════════════════════════
const circles = [];
let idC = 0;

class Circle {
  constructor(isPlayer=false, isBoss=false, team=null) {
    this.id       = idC++;
    this.isPlayer = isPlayer;
    this.isBoss   = isBoss;
    this.team     = team; // 'red' | 'blue' | null
    this.color    = isBoss ? '#ff4d4d' : COLORS[rndI(0,COLORS.length-1)];
    this.emoji    = isBoss ? '👹' : EMOJIS[rndI(0,EMOJIS.length-1)];
    this.name     = isPlayer ? '🎮 TÚ' : isBoss ? '👹 JEFE' : NAMES[rndI(0,NAMES.length-1)];
    this.mass     = isPlayer ? 120 : isBoss ? 600+waveNum*120 : rnd(50,170+waveNum*18);
    this.x        = isPlayer ? W/2 : isBoss ? rnd(130,W-130) : rnd(60,W-60);
    this.y        = isPlayer ? H/2 : isBoss ? rnd(100,H-200) : rnd(80,H-180);
    this.baseSpeed= isPlayer ? 2.9 : isBoss ? 2.0 : rnd(1.3,2.6);
    this.speed    = this.baseSpeed; this.speedMult=1; this.speedTimer=0;
    this.vx=rnd(-1,1); this.vy=rnd(-1,1);
    this.alive=true; this.alpha=0; this.pulse=rnd(0,Math.PI*2);
    this.kills=0; this.isKing=false; this.trailT=0;
    this.aiState='wander'; this.aiTarget=null; this.aiTimer=0;
    // XP / level only for player
    this.xp=0; this.level=1;
    // Real profile photo
    this.avatarUrl=null; this.avatarImg=null;
  }

  get radius() { return clamp(Math.sqrt(Math.max(0,this.mass)) * (this.isBoss?4.2:2.9), 6, this.isBoss?200:130); }

  update() {
    if (!this.alive) return;
    this.alpha = clamp(this.alpha+.04,0,1);
    this.pulse += .05;
    if (this.speedTimer>0){this.speedTimer--;if(this.speedTimer===0)this.speedMult=1;}
    this.updateAI();

    // Trail
    if (this.isPlayer) {
      this.trailT++;
      if(this.trailT%3===0) trail(this.x,this.y,this.color);
    }

    this.x+=this.vx; this.y+=this.vy;
    const r=this.radius, pad=98;
    if(this.x-r<0){this.x=r;this.vx=Math.abs(this.vx);}
    if(this.x+r>W){this.x=W-r;this.vx=-Math.abs(this.vx);}
    if(this.y-r<48){this.y=r+48;this.vy=Math.abs(this.vy);}
    if(this.y+r>H-pad){this.y=H-pad-r;this.vy=-Math.abs(this.vy);}
  }

  updateAI() {
    const spd=this.speed*this.speedMult;
    this.aiTimer--;

    if (this.isBoss) {
      // Boss: chase player OR king
      const tgt=(bossCurrent===this ? player : (king||player)) || circles.find(c=>c.alive&&!c.isBoss);
      if(!tgt) return;
      const dx=tgt.x-this.x, dy=tgt.y-this.y, d=Math.sqrt(dx*dx+dy*dy)||1;
      this.vx+=(dx/d)*.2; this.vy+=(dy/d)*.2;
      const l=Math.sqrt(this.vx*this.vx+this.vy*this.vy)||1;
      this.vx=(this.vx/l)*spd; this.vy=(this.vy/l)*spd; return;
    }

    if (this.aiTimer<=0) {
      let nearBig=null,nearSmall=null,minBD=Infinity,minSD=Infinity;
      for(const c of circles){
        if(!c.alive||c===this) continue;
        const dx=c.x-this.x,dy=c.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d>320) continue;
        if(c.mass>this.mass*1.25&&d<minBD){minBD=d;nearBig=c;}
        if(c.mass<this.mass*.75&&d<minSD){minSD=d;nearSmall=c;}
      }
      // King-mode: everyone hunts the king
      if(king&&king!==this&&king.isPlayer&&this.mass>king.mass*.4){
        this.aiState='hunt_king'; this.aiTarget=king; this.aiTimer=80;
      } else if(nearBig&&minBD<200){
        this.aiState='flee'; this.aiTarget=nearBig; this.aiTimer=45;
      } else if(nearSmall){
        this.aiState='chase'; this.aiTarget=nearSmall; this.aiTimer=70;
      } else {
        this.aiState='wander'; this.aiTimer=rndI(55,130);
      }
    }

    const applyVel=(tx,ty,sign,mult=1)=>{
      const dx=tx-this.x,dy=ty-this.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      this.vx+=sign*(dx/d)*mult; this.vy+=sign*(dy/d)*mult;
      const l=Math.sqrt(this.vx*this.vx+this.vy*this.vy)||1;
      this.vx=(this.vx/l)*spd; this.vy=(this.vy/l)*spd;
    };

    if(this.aiState==='chase'&&this.aiTarget?.alive)        applyVel(this.aiTarget.x,this.aiTarget.y,1,.28);
    else if(this.aiState==='hunt_king'&&this.aiTarget?.alive) applyVel(this.aiTarget.x,this.aiTarget.y,1,.32);
    else if(this.aiState==='flee'&&this.aiTarget?.alive)    applyVel(this.aiTarget.x,this.aiTarget.y,-1,.34);
    else {
      this.aiTimer--;
      if(this.aiTimer<=0){
        const a=rnd(0,Math.PI*2);
        this.vx=Math.cos(a)*spd; this.vy=Math.sin(a)*spd;
        this.aiTimer=rndI(60,150); this.aiState='wander';
      }
    }
  }

  draw() {
    if (!this.alive) return;
    const r=this.radius; if(r<2) return;
    const cr=Math.max(.1,r);
    ctx.save(); ctx.globalAlpha=this.alpha;

    // KING crown glow
    if (this.isKing) {
      const kg=ctx.createRadialGradient(this.x,this.y,cr*.8,this.x,this.y,cr*2);
      kg.addColorStop(0,'rgba(255,190,11,.35)'); kg.addColorStop(1,'rgba(255,190,11,0)');
      ctx.fillStyle=kg; ctx.beginPath(); ctx.arc(this.x,this.y,cr*2,0,Math.PI*2); ctx.fill();
    }
    // Boss aura
    if (this.isBoss) {
      const ag=ctx.createRadialGradient(this.x,this.y,cr*.7,this.x,this.y,cr*1.9);
      ag.addColorStop(0,'rgba(255,77,77,.32)'); ag.addColorStop(1,'rgba(255,77,77,0)');
      ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(this.x,this.y,cr*1.9,0,Math.PI*2); ctx.fill();
    }

    ctx.shadowBlur=(this.isPlayer?22:14)*(.65+Math.sin(this.pulse)*.35);
    ctx.shadowColor=this.color;

    // Ring
    ctx.strokeStyle=this.isKing?'#ffbe0b':this.color;
    ctx.lineWidth=this.isPlayer?3.5:this.isBoss?4.5:2;
    ctx.beginPath(); ctx.arc(this.x,this.y,cr,0,Math.PI*2); ctx.stroke();

    // Fill
    const fg=ctx.createRadialGradient(this.x-cr*.28,this.y-cr*.28,cr*.08,this.x,this.y,cr);
    fg.addColorStop(0, lightenHex(this.color,42,.92));
    fg.addColorStop(1, hexToRgba(this.color,.58));
    ctx.fillStyle=fg; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(this.x,this.y,Math.max(.1,cr-1),0,Math.PI*2); ctx.fill();

    // Avatar — real photo or emoji fallback
    ctx.save(); ctx.beginPath();
    const ar=Math.max(.1,cr-2.5);
    ctx.arc(this.x,this.y,ar,0,Math.PI*2); ctx.clip();
    if(this.avatarImg && this.avatarImg.complete && this.avatarImg.naturalWidth>0){
      ctx.drawImage(this.avatarImg, this.x-ar, this.y-ar, ar*2, ar*2);
    } else {
      ctx.drawImage(getAvatar(this.color,this.emoji), this.x-ar, this.y-ar, ar*2, ar*2);
    }
    ctx.restore();

    // Mass
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`bold ${clamp(cr*.31,8,18)}px Orbitron,monospace`;
    ctx.shadowBlur=3; ctx.shadowColor='rgba(0,0,0,.9)';
    ctx.fillText(Math.floor(this.mass), this.x, this.y+cr*.46);

    // Name
    ctx.shadowBlur=0; ctx.fillStyle=this.isPlayer?'#fff':'rgba(255,255,255,.72)';
    ctx.font=`600 ${clamp(cr*.27,7,12)}px Rajdhani,sans-serif`;
    const nm=this.name.length>15?this.name.slice(0,14)+'…':this.name;
    ctx.fillText(nm, this.x, this.y+cr+13);

    // King crown
    if (this.isKing) { ctx.font=`${clamp(cr*.3,10,20)}px serif`; ctx.fillText('👑',this.x, this.y-cr-10); }
    else if (this.isPlayer) { ctx.fillStyle='rgba(255,255,255,.7)'; ctx.font='9px sans-serif'; ctx.fillText('▼',this.x,this.y-cr-7); }

    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════════
let player, king=null;
let kills=0, combo=0, comboTimer=0;
let waveNum=1, waveKills=0, waveKillGoal=8;
let bossCurrent=null;
let totalLikes=0, likesBossThreshold=50;
let frame=0, kingT=0;
const GAME_DURATION=10800;
let gameTime=GAME_DURATION, gameOver=false;
const graveyard=[];

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
function init() {
  circles.length=0;
  kills=0; combo=0; waveNum=1; waveKills=0; waveKillGoal=8;
  bossCurrent=null; king=null; totalLikes=0;
  gameTime=GAME_DURATION; gameOver=false; graveyard.length=0;

  player=null;

  // Arena starts empty — viewers join via TikTok events
}

function spawnPlayerNow() {
  if(player&&player.alive) return; // already in
  document.getElementById('like-spawn').style.display='none';
  player=new Circle(true);
  player.color='#8338ec'; player.emoji='⚡';
  player.x=W/2; player.y=H/2;
  circles.push(player);
  burst(player.x,player.y,'#8338ec',20,7);
  showNotif('⚡ ¡ENTRASTE A LA ARENA!','#8338ec');
  snd.sup();
}

function spawnBot(elite=false) {
  const bots=circles.filter(c=>c.alive&&!c.isPlayer&&!c.isBoss);
  if(bots.length>=50) return;
  const c=new Circle(false,false,null);
  if(elite){c.mass=160+waveNum*35; c.color=COLORS[rndI(0,COLORS.length-1)];}
  if(player){
    const dx=c.x-player.x, dy=c.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<140) c.x=player.x>W/2?rnd(55,W*.38):rnd(W*.62,W-55);
  }
  circles.push(c);
}

// ── Public API: spawn real viewer ──────────────────────────────
function spawnViewer(name, avatarUrl, emojiOverride) {
  const c=new Circle(false,false,null);
  c.name=name.length>18?name.slice(0,17)+'…':name;
  if(emojiOverride) c.emoji=emojiOverride;
  // Load real profile photo
  if(avatarUrl){
    c.avatarUrl=avatarUrl;
    const img=new Image();
    img.crossOrigin='anonymous';
    img.src=avatarUrl;
    c.avatarImg=img;
  }
  if(player){
    const dx=c.x-player.x,dy=c.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<140) c.x=player.x>W/2?rnd(55,W*.38):rnd(W*.62,W-55);
  }
  circles.push(c);
  floatText(c.x, c.y-c.radius-10, `@${name}`, '#00f5ff');
}

function spawnBoss() {
  if(bossCurrent?.alive) return;
  const boss=new Circle(false,true,null);
  boss.x=rnd(150,W-150); boss.y=180;
  circles.push(boss);
  bossCurrent=boss;
  document.getElementById('boss-hud').classList.add('on');
  announce(`👹 BOSS! OLA ${waveNum}`, '#ff4d4d');
  snd.boss();
}

// ═══════════════════════════════════════════════════════════════
// COLLISIONS  (Agar.io style)
// ═══════════════════════════════════════════════════════════════
function handleCollisions() {
  for(let i=0;i<circles.length;i++){
    const a=circles[i]; if(!a.alive) continue;
    for(let j=i+1;j<circles.length;j++){
      const b=circles[j]; if(!b.alive) continue;

      const dx=b.x-a.x, dy=b.y-a.y, dist=Math.sqrt(dx*dx+dy*dy);
      const touch=(a.radius+b.radius)*.9;
      if(dist>=touch) continue;

      // ── CONTINUOUS PUSH: always separate overlapping circles ──
      const overlap=touch-dist;
      const l=dist||1;
      const pushX=(dx/l)*overlap*0.5, pushY=(dy/l)*overlap*0.5;
      a.x-=pushX; a.y-=pushY;
      b.x+=pushX; b.y+=pushY;
      // velocity bounce
      a.vx-=(dx/l)*1.6; a.vy-=(dy/l)*1.6;
      b.vx+=(dx/l)*1.6; b.vy+=(dy/l)*1.6;

      // ── KILL: only if clearly bigger ──
      const big=a.mass>=b.mass?a:b, small=a.mass>=b.mass?b:a;
      // Need to be clearly bigger to deal damage (at least 15% more mass)
      if(big.mass < small.mass*1.15) continue; // just bounced, no damage

      // Flat 2 damage per collision frame — no mass proportion
      small.mass-=2;
      big.mass=clamp(big.mass+2,1,800);
      snd.hit();

      if(small.mass<=0){
        small.alive=false;
        burst(small.x,small.y,small.color,small.isBoss?32:16,small.isBoss?9:5);
        snd.kill();

        // Points: 5 if killer is big, 2 if killer is small
        const pts = small.isBoss ? 10 : (big.radius >= 40 ? 5 : 2);

        big.kills+=pts;
        graveyard.push({name:small.name,kills:small.kills,color:small.color,emoji:small.emoji,isPlayer:small.isPlayer});

        if(big===player){
          kills+=pts; waveKills++;
          combo++; comboTimer=200;
          if(combo>=2) snd.combo();
          addKillFeed(small.name, small.isBoss);
          floatText(small.x, small.y-small.radius-10, `+${pts}pts`, pts>=5?'#ffbe0b':'#06d6a0');
          gainXP(small.isBoss?80:pts*5);
          checkWave();
        }
        if(small.isBoss){
          bossCurrent=null;
          document.getElementById('boss-hud').classList.remove('on');
          showNotif('👹 BOSS ELIMINADO!','#ff4d4d');
          gainXP(200);
        }
        big.vx+=(dx/l)*1.5; big.vy+=(dy/l)*1.5;
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// WAVE & KING
// ═══════════════════════════════════════════════════════════════
function checkWave() {
  if(bossCurrent?.alive){
    const maxHP=600+waveNum*120;
    document.getElementById('boss-hp-fill').style.width=clamp(bossCurrent.mass/maxHP*100,0,100)+'%';
  }
  if(waveKills>=waveKillGoal){
    waveNum++; waveKills=0; waveKillGoal=8+waveNum*3;
    document.getElementById('wa-v').textContent=waveNum;
    if(waveNum%3===0){
      setTimeout(spawnBoss,1800);
      announce(`⚠️ OLA ${waveNum} – BOSS!`,'#ff4d4d');
    } else {
      announce(`🌊 OLA ${waveNum}`,'#ffbe0b');
      for(let i=0;i<Math.min(waveNum,8);i++) setTimeout(()=>spawnBot(true), i*350);
    }
  }
}

function tickKing() {
  kingT++;
  if(kingT%120!==0) return;
  const alive=circles.filter(c=>c.alive);
  if(!alive.length) return;
  const newKing=alive.reduce((a,b)=>b.kills>a.kills?b:a);
  if(newKing!==king){
    if(king) king.isKing=false;
    king=newKing; king.isKing=true;
    const kb=document.getElementById('king-banner');
    kb.classList.add('on');
    const nm=king.isPlayer?'¡TÚ!':king.name;
    document.getElementById('king-banner').textContent=`👑 REY DEL CHAT: ${nm}`;
    if(king.isPlayer){ snd.king(); showNotif('👑 ¡ERES EL REY!','#ffbe0b'); }
  }
}

// ═══════════════════════════════════════════════════════════════
// XP / LEVEL
// ═══════════════════════════════════════════════════════════════
function gainXP(amt) {
  if(!player) return;
  player.xp+=amt;
  const needed=player.level*120;
  if(player.xp>=needed){
    player.xp-=needed; player.level++;
    player.mass=clamp(player.mass+50,1,800);
    player.baseSpeed=clamp(player.baseSpeed+.07,0,6);
    document.getElementById('lv-v').textContent=player.level;
    document.getElementById('lvlup-text').textContent=`NIVEL ${player.level}`;
    const el=document.getElementById('lvlup');
    el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
    snd.lvlup();
    burst(player.x,player.y,'#8338ec',25,7);
  }
  // XP bar
  const needed2=player.level*120;
  document.getElementById('xp-fill').style.width=clamp(player.xp/needed2*100,0,100)+'%';
}

// ═══════════════════════════════════════════════════════════════
// LIKE BOSS TRIGGER
// ═══════════════════════════════════════════════════════════════
function addLike(n=1) {
  totalLikes+=n;
  document.getElementById('lk-v').textContent=totalLikes;
  const pct=clamp((totalLikes%likesBossThreshold)/likesBossThreshold*100,0,100);
  document.getElementById('like-bar-fill').style.width=pct+'%';
  if(totalLikes>0&&totalLikes%likesBossThreshold===0){
    spawnBoss();
    showNotif(`💥 ${likesBossThreshold} LIKES = BOSS!`,'#ff4d4d');
  }
}

// ═══════════════════════════════════════════════════════════════

// ── WebSocket listener (TikFinity connects here on port 21213) ─
function tryConnectWS() {
  try {
    const ws=new WebSocket('ws://localhost:21213');
    ws.onopen=()=>{
      document.getElementById('ws-dot').classList.add('on');
      document.getElementById('ws-txt').textContent='TikFinity: ON';
    };
    ws.onclose=()=>{
      document.getElementById('ws-dot').classList.remove('on');
      document.getElementById('ws-txt').textContent='TikFinity: OFF';
    };
    ws.onmessage=(e)=>{
      try{
        const d=JSON.parse(e.data);
        if(d.type==='like')    window.dispatchEvent(new CustomEvent('tiktok-like',{detail:{count:d.count||1}}));
        if(d.type==='comment') window.dispatchEvent(new CustomEvent('tiktok-comment',{detail:{username:d.username, avatarUrl:d.avatarUrl||d.profilePictureUrl||null}}));
        if(d.type==='gift')    window.dispatchEvent(new CustomEvent('tiktok-gift',{detail:{value:d.diamondCount||1}}));
        if(d.type==='follow')  window.dispatchEvent(new CustomEvent('tiktok-follow',{detail:{username:d.username, avatarUrl:d.avatarUrl||d.profilePictureUrl||null}}));
      }catch(ex){}
    };
  } catch(ex) {}
}
setTimeout(tryConnectWS, 1200);

// ═══════════════════════════════════════════════════════════════
// BACKGROUND — cinematic
// ═══════════════════════════════════════════════════════════════
// Pre-generate static star field
const STARS = Array.from({length:160},()=>({
  x:Math.random()*2000, y:Math.random()*2000,
  r:Math.random()*1.5+.3, twinkle:Math.random()*Math.PI*2,
  speed:Math.random()*.04+.01
}));
// Nebula blobs config
const NEBULAS=[
  {ox:.15,oy:.18,r:380,c1:'rgba(131,56,236,.13)',c2:'rgba(255,0,110,.07)',sx:.9,sy:.7},
  {ox:.82,oy:.6, r:320,c1:'rgba(0,245,255,.09)',c2:'rgba(131,56,236,.05)',sx:.7,sy:1.1},
  {ox:.45,oy:.85,r:290,c1:'rgba(255,0,110,.11)',c2:'rgba(255,190,11,.04)',sx:1.1,sy:.8},
  {ox:.6, oy:.2, r:250,c1:'rgba(6,214,160,.08)',c2:'rgba(0,245,255,.04)',sx:.85,sy:1.0},
];

function drawBG() {
  const t=Date.now()*.0004;

  // Deep space base
  ctx.fillStyle='#020410';
  ctx.fillRect(0,0,W,H);

  // Radial vignette
  const vg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.72);
  vg.addColorStop(0,'rgba(8,6,28,.0)');
  vg.addColorStop(1,'rgba(2,2,14,.85)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  // Nebula clouds (animated)
  for(const n of NEBULAS){
    const bx=n.ox*W + Math.sin(t*n.sx+n.oy)*60;
    const by=n.oy*H + Math.cos(t*n.sy+n.ox)*45;
    const g=ctx.createRadialGradient(bx,by,0,bx,by,n.r);
    g.addColorStop(0,n.c1);
    g.addColorStop(.55,n.c2);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(bx,by,n.r,0,Math.PI*2); ctx.fill();
  }

  // Stars
  for(const s of STARS){
    s.twinkle+=s.speed;
    const alpha=.25+Math.sin(s.twinkle)*.25;
    const sx=s.x%W, sy=s.y%H;
    ctx.beginPath(); ctx.arc(sx,sy,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${alpha})`; ctx.fill();
  }

  // Subtle scan lines
  ctx.fillStyle='rgba(0,0,0,.03)';
  for(let y=0;y<H;y+=4){ ctx.fillRect(0,y,W,2); }

  // Faint hex grid
  const gs=72, t2=Date.now()*.00006;
  ctx.strokeStyle=`rgba(131,56,236,${.03+Math.sin(t2)*.01})`;
  ctx.lineWidth=.5;
  for(let x=-gs;x<W+gs;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=-gs;y<H+gs;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

// ═══════════════════════════════════════════════════════════════
// HUD UPDATE
// ═══════════════════════════════════════════════════════════════
function updateHUD() {
  document.getElementById('kl-v').textContent=kills;
  if(!player){document.getElementById('ms-v').textContent='—';} else {
  document.getElementById('ms-v').textContent=Math.floor(player.mass);}
  document.getElementById('al-v').textContent=circles.filter(c=>c.alive).length;

  // Ranking — sorted by kills
  const ranked=circles.filter(c=>c.alive).sort((a,b)=>b.kills-a.kills).slice(0,5);
  const rl=document.getElementById('rank-list'); rl.innerHTML='';
  const medals=['🥇','🥈','🥉','④','⑤'];
  ranked.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='re'+(c.isKing?' king':'')+(c.isPlayer?' me':'');
    d.innerHTML=`<span class="rm">${c.kills}💀</span><span class="rn">${c.name.length>12?c.name.slice(0,11)+'…':c.name}</span><span class="rp">${medals[i]}</span>`;
    rl.appendChild(d);
  });

  // Timer
  const secs=Math.ceil(gameTime/60);
  const m=Math.floor(secs/60), s=secs%60;
  const tv=document.getElementById('timer-val');
  tv.textContent=`${m}:${String(s).padStart(2,'0')}`;
  tv.className=secs<=30?'urgent':'';
}

// KILL FEED / NOTIFS / ANNOUNCE
// ═══════════════════════════════════════════════════════════════
function addKillFeed(name, isBoss=false) {
  const f=document.getElementById('killfeed');
  const el=document.createElement('div'); el.className='kfe';
  el.innerHTML=`${isBoss?'💀':'⚡'} <span style="color:#8338ec">TÚ</span> → <span style="color:#ff006e">${name}</span>`;
  f.insertBefore(el,f.firstChild);
  setTimeout(()=>el.remove(),3200);
  if(f.children.length>5) f.lastChild?.remove();
}
function showNotif(text,color) {
  const n=document.getElementById('notifs');
  const el=document.createElement('div'); el.className='notif'; el.style.color=color; el.textContent=text;
  n.appendChild(el); setTimeout(()=>el.remove(),960);
}
function announce(text,color) {
  const el=document.getElementById('wave-ann');
  el.innerHTML=`<div style="font-family:Orbitron,monospace;font-weight:900;font-size:2.2rem;letter-spacing:5px;color:${color};text-shadow:0 0 20px ${color};opacity:0;animation:npop 1.6s ease-out forwards">${text}</div>`;
}
function tickCombo() {
  if(comboTimer>0){comboTimer--;if(comboTimer===0)combo=0;}
  const cn=document.getElementById('combo-num'), cl=document.getElementById('combo-lbl');
  if(combo>=2){
    cn.style.display='block'; cl.style.display='block';
    cn.textContent=combo+'x';
    cn.style.transform=`scale(${1+Math.sin(frame*.16)*.06})`;
  } else { cn.style.display='none'; cl.style.display='none'; }
}

// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════
// END GAME + PODIUM
// ═══════════════════════════════════════════════════════════════
function endGame() {
  if(gameOver) return;
  gameOver=true;
  // Save alive circles to graveyard snapshot
  for(const c of circles){
    graveyard.push({name:c.name,kills:c.kills,color:c.color,emoji:c.emoji,isPlayer:c.isPlayer});
  }
  // Build final leaderboard (deduplicate by name+kills, keep highest)
  const seen=new Map();
  for(const g of graveyard){
    const key=g.name;
    if(!seen.has(key)||g.kills>seen.get(key).kills) seen.set(key,g);
  }
  const all=[...seen.values()].sort((a,b)=>b.kills-a.kills);
  showPodium(all);
}

function showPodium(all) {
  const top3=all.slice(0,3);
  const playerEntry=all.find(g=>g.isPlayer);
  const playerRank=all.indexOf(playerEntry)+1;

  const medals=['🥇','🥈','🥉'];
  const posClass=['pod-1st','pod-2nd','pod-3rd'];
  const heights=[120,86,62];
  const order=[1,0,2]; // render 2nd, 1st, 3rd for classic podium shape

  const stage=document.getElementById('pod-stage');
  stage.innerHTML='';
  for(const idx of order){
    const e=top3[idx]; if(!e) continue;
    const col=document.createElement('div');
    col.className='pod-col '+posClass[idx];
    col.style.cssText=`animation:podIn .6s ${idx===0?.3:idx===1?.1:.5}s ease-out both;`;
    col.innerHTML=`
      <div class="pod-medal">${medals[idx]}</div>
      <div class="pod-avatar">${e.emoji}</div>
      <div class="pod-name" style="color:${e.color};text-shadow:0 0 8px ${e.color}">${e.name}</div>
      <div class="pod-kills">${e.kills} KILLS</div>
      <div class="pod-block" data-pos="${idx+1}" style="height:${heights[idx]}px"></div>`;
    stage.appendChild(col);
  }

  const pr=document.getElementById('pod-player-rank');
  if(playerRank>3&&playerEntry){
    pr.textContent=`TÚ: PUESTO #${playerRank} — ${playerEntry.kills} KILLS`;
  } else if(playerRank<=3){
    pr.textContent=`🏆 ¡QUEDASTE EN EL TOP 3!`;
    pr.style.color='#ffbe0b';
  } else {
    pr.textContent='';
  }

  const ov=document.getElementById('podium-overlay');
  ov.classList.add('on');
  // Countdown style entry animation
  if(!document.getElementById('pod-anim-style')){
    const st=document.createElement('style');
    st.id='pod-anim-style';
    st.textContent='@keyframes podIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}';
    document.head.appendChild(st);
  }
}

function restartGame() {
  document.getElementById('podium-overlay').classList.remove('on');
  init();
}

// ═══════════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════════
function loop() {
  frame++; requestAnimationFrame(loop);
  if(gameOver) return;
  drawBG();

  // Game timer countdown
  gameTime--;
  if(gameTime<=0){ endGame(); return; }

  // Spawn

  // Timers

  // Clean dead
  for(let i=circles.length-1;i>=0;i--) if(!circles[i].alive&&!circles[i].isPlayer) circles.splice(i,1);

  // player moves via AI

  // Update
  for(const c of circles) c.update();

  // Systems
  handleCollisions();
  tickKing(); tickCombo(); tickP();

  // Draw
  drawP();
  const sorted=[...circles].sort((a,b)=>a.radius-b.radius);
  for(const c of sorted) c.draw();

  if(frame%5===0) updateHUD();

  // "Waiting for viewers" message when arena is empty
  const alive=circles.filter(c=>c.alive);
  if(alive.length===0){
    ctx.save();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold 1.1rem Orbitron,monospace';
    ctx.fillStyle='rgba(255,255,255,.18)';
    ctx.fillText('Esperando espectadores...', W/2, H/2-16);
    ctx.font='.6rem Orbitron,monospace';
    ctx.fillStyle='rgba(255,255,255,.1)';
    ctx.fillText('Los que comenten en el LIVE entran a la arena', W/2, H/2+14);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════════
init(); loop();

// Tips
setTimeout(()=>showNotif('TikTok LIVE: los comentarios entran a la arena','rgba(255,255,255,.65)'),1000);
</script>
